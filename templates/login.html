<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truble — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent-cyan:   #00e5ff;
        --accent-blue:   #3d8bff;
        --accent-violet: #7b5cff;
        --bg-deep:       #050810;
        --text-primary:  #eef2ff;
        --text-dim:      rgba(200, 215, 245, 0.6);
        --border-subtle: rgba(255, 255, 255, 0.08);
        --border-glow:   rgba(0, 229, 255, 0.3);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      .video-background {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        filter: brightness(0.28) saturate(1.5);
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 55% at 50% 0%,  rgba(61,139,255,0.13) 0%, transparent 65%),
          radial-gradient(ellipse 50% 40% at 80% 90%, rgba(123,92,255,0.11) 0%, transparent 55%);
        pointer-events: none;
        z-index: -1;
      }

      .card {
        width: min(400px, 92vw);
        background: rgba(6, 10, 26, 0.75);
        backdrop-filter: blur(28px) saturate(1.5);
        -webkit-backdrop-filter: blur(28px) saturate(1.5);
        border: 1px solid var(--border-subtle);
        border-radius: 24px;
        padding: 44px 40px 40px;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.04),
          0 24px 64px rgba(0,0,0,0.55),
          inset 0 1px 0 rgba(255,255,255,0.07);
        position: relative;
        animation: cardReveal 0.65s cubic-bezier(.22,1,.36,1) both;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 20%; right: 20%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-violet), transparent);
        border-radius: 99px;
      }

      @keyframes cardReveal {
        from { opacity: 0; transform: translateY(24px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      .brand {
        text-align: center;
        margin-bottom: 36px;
      }

      .brand-name {
        font-family: 'Syne', sans-serif;
        font-size: 32px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 50%, var(--accent-violet) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }

      .brand-sub {
        font-size: 13px;
        color: var(--text-dim);
        margin-top: 4px;
        font-weight: 400;
        letter-spacing: 0.3px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        margin-top: 20px;
      }

      label:first-of-type { margin-top: 0; }

      input[type="text"],
      input[type="password"],
      input[type="email"] {
        width: 100%;
        height: 46px;
        padding: 0 16px;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        color: var(--text-primary);
        font-family: 'Space Grotesk', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        margin-bottom: 0;
      }

      input[type="text"]::placeholder,
      input[type="password"]::placeholder,
      input[type="email"]::placeholder {
        color: rgba(180, 195, 230, 0.3);
      }

      input[type="text"]:focus,
      input[type="password"]:focus,
      input[type="email"]:focus {
        border-color: rgba(0, 229, 255, 0.4);
        background: rgba(0, 229, 255, 0.03);
        box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08);
      }

      button[type="submit"] {
        width: 100%;
        height: 48px;
        margin-top: 28px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 60%, var(--accent-violet) 100%);
        color: #050810;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.4px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        box-shadow: 0 4px 20px rgba(0, 229, 255, 0.28);
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0, 229, 255, 0.4);
        filter: brightness(1.05);
      }

      button[type="submit"]:active { transform: translateY(0); }

      .footer-text {
        text-align: center;
        margin-top: 22px;
        font-size: 13px;
        color: var(--text-dim);
      }

      .footer-text a {
        color: var(--accent-cyan);
        text-decoration: none;
        font-weight: 500;
        transition: opacity 0.15s;
      }

      .footer-text a:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <video class="video-background" autoplay loop muted playsinline>
      <source src="{{ url_for('static', filename='img/stars.mp4') }}" type="video/mp4">
    </video>

    <div class="card">
      <div class="brand">
        <div class="brand-name">Truble</div>
        <div class="brand-sub">NLP Translation Platform</div>
      </div>

      <form action="/" method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit">Sign In</button>
      </form>

      <p class="footer-text">Don't have an account? <a href="{{ url_for('sign_up') }}">Sign Up</a></p>
    </div>
</body>
</html>

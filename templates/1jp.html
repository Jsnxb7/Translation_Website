<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://unpkg.com/@webcomponents/webcomponentsjs@2.1.3/webcomponents-loader.js"></script>
  <script src="https://unpkg.com/resize-observer-polyfill@1.5.0/dist/ResizeObserver.js"></script>
  <script src="https://unpkg.com/focus-visible@5.0.2/dist/focus-visible.js" defer></script>

  <script src="{{ url_for('static', filename='scriptjp.js') }}"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='2.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styleguide.css') }}" />
</head>

<body>

<video class="video-background" autoplay loop muted playsinline>
  <source src="{{ url_for('static', filename='img/stars.mp4') }}" type="video/mp4">
</video>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

  <div class="content">
    <div class="LOGO">
      <div class="div">
        <div class="logo">
          <div class="all-in-one-social">Truble</div>
        </div>
        <img class="network" src="{{ url_for('static', filename='img/logo.png') }}" />
      </div>
    </div>

    <button>
      <img src="{{ url_for('static', filename='img/conv.png') }}" />
      Text
    </button>

    <button onclick="goToImage()">
      <img src="{{ url_for('static', filename='img/usg.png') }}" />
      Image (Japanese)
    </button>

    <button onclick="goToRecord()">
      <img src="{{ url_for('static', filename='img/dash.png') }}" />
      Speech
    </button>
  </div>
</div>

<!-- Main Content -->
<div class="main-content" id="main-content">

  <!-- NLP Status -->
  <div class="nlp-widget">
    <h3>Live NLP Status</h3>

    <div class="nlp-item">
      <span class="label">🌐 Translation</span>
      <span class="value" id="mode-translation">EN → JA</span>
    </div>

    <div class="nlp-item">
      <span class="label">🎤 Speech Input</span>
      <span class="value" id="mode-speech">OFF</span>
    </div>

    <div class="nlp-item">
      <span class="label">🔊 Text to Speech</span>
      <span class="value" id="mode-tts">Japanese</span>
    </div>

    <div class="nlp-item">
      <span class="label">🧠 NLP Model</span>
      <span class="value" id="mode-model">MarianMT</span>
    </div>

    <div class="nlp-item">
      <span class="label">📦 Pipeline</span>
      <span class="value active" id="mode-pipeline">Idle</span>
    </div>
  </div>

  <!-- Profile -->
  <div class="profile">
    <button id="profilebutton" class="tbb1"></button>

    <ul class="dropdown-menu">
      <li class="dropdown-item">
        <a href="{{ url_for('profile', name=name, post=post, unique_id=unique_id) }}" class="dropdown-link">
          Account
        </a>
      </li>
      <li class="dropdown-item">
        <a href="{{ url_for('login') }}" class="dropdown-link">Logout</a>
      </li>
    </ul>

    <div class="overlap-group-2">
      <div class="text-wrapper-2">{{ name }}</div>
      <div class="text-wrapper-3">{{ post }}</div>

      <!-- JSON SYSTEM SUPPORT -->
      <input type="hidden" id="name" value="{{ name }}">
      <input type="hidden" id="post" value="{{ post }}">
      <input type="hidden" id="unique_id" value="{{ unique_id }}">
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div class="msg assistant">Hello! How can I help you today?</div>
  </div>

  <div class="input-bar">
    <div class="input-wrapper">
      <input type="text" id="message-input" placeholder="Type a message..." />
      <button class="send-button" onclick="translat()"></button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script>

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("collapsed");
  document.getElementById("main-content").classList.toggle("collapsed");
}

/* Navigation WITH unique_id */

function goToImage() {
  const name = document.getElementById("name").value;
  const post = document.getElementById("post").value;
  const unique_id = document.getElementById("unique_id").value;

  window.location.href =
    `/image_jp?name=${encodeURIComponent(name)}&post=${encodeURIComponent(post)}&unique_id=${encodeURIComponent(unique_id)}`;
}

function goToRecord() {
  const name = document.getElementById("name").value;
  const post = document.getElementById("post").value;
  const unique_id = document.getElementById("unique_id").value;

  window.location.href =
    `/recordjp?name=${encodeURIComponent(name)}&post=${encodeURIComponent(post)}&unique_id=${encodeURIComponent(unique_id)}`;
}

/* Profile Dropdown */

document.addEventListener('DOMContentLoaded', function () {
  const button = document.getElementById('profilebutton');
  const dropdown = document.querySelector('.dropdown-menu');

  button.addEventListener('mouseenter', () => dropdown.style.display = 'block');
  button.addEventListener('mouseleave', () => {
    setTimeout(() => {
      if (!dropdown.matches(':hover')) {
        dropdown.style.display = 'none';
      }
    }, 200);
  });

  dropdown.addEventListener('mouseenter', () => dropdown.style.display = 'block');
  dropdown.addEventListener('mouseleave', () => dropdown.style.display = 'none');
});

/* Service Worker */

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/sw.js")
    .then(() => console.log("Service Worker Registered"));
}

</script>

</body>
</html>

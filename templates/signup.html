<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truble — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent-cyan:   #00e5ff;
        --accent-blue:   #3d8bff;
        --accent-violet: #7b5cff;
        --accent-green:  #00ffb2;
        --bg-deep:       #050810;
        --text-primary:  #eef2ff;
        --text-dim:      rgba(200, 215, 245, 0.6);
        --border-subtle: rgba(255, 255, 255, 0.08);
        --border-glow:   rgba(0, 229, 255, 0.3);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      .video-background {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
        filter: brightness(0.25) saturate(1.5);
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 55% at 50% 0%,  rgba(123,92,255,0.12) 0%, transparent 65%),
          radial-gradient(ellipse 50% 40% at 20% 90%, rgba(0,229,255,0.10) 0%, transparent 55%);
        pointer-events: none;
        z-index: -1;
      }

      .card {
        width: min(440px, 92vw);
        background: rgba(6, 10, 26, 0.78);
        backdrop-filter: blur(28px) saturate(1.5);
        -webkit-backdrop-filter: blur(28px) saturate(1.5);
        border: 1px solid var(--border-subtle);
        border-radius: 24px;
        padding: 44px 40px 40px;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.04),
          0 24px 64px rgba(0,0,0,0.55),
          inset 0 1px 0 rgba(255,255,255,0.07);
        position: relative;
        animation: cardReveal 0.65s cubic-bezier(.22,1,.36,1) both;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 20%; right: 20%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-violet), var(--accent-cyan), transparent);
        border-radius: 99px;
      }

      @keyframes cardReveal {
        from { opacity: 0; transform: translateY(24px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      .brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .brand-name {
        font-family: 'Syne', sans-serif;
        font-size: 30px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-blue) 50%, var(--accent-cyan) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }

      .brand-sub {
        font-size: 13px;
        color: var(--text-dim);
        margin-top: 4px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
        margin-bottom: 16px;
      }

      .form-group.full { grid-column: 1 / -1; }

      label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      input {
        height: 44px;
        padding: 0 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border-subtle);
        border-radius: 11px;
        color: var(--text-primary);
        font-family: 'Space Grotesk', sans-serif;
        font-size: 14px;
        outline: none;
        width: 100%;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        margin-bottom: 0;
      }

      input::placeholder { color: rgba(180, 195, 230, 0.28); }

      input:focus {
        border-color: rgba(0, 229, 255, 0.4);
        background: rgba(0, 229, 255, 0.03);
        box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08);
      }

      button[type="submit"] {
        width: 100%;
        height: 48px;
        margin-top: 8px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-blue) 55%, var(--accent-cyan) 100%);
        color: #050810;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.4px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        box-shadow: 0 4px 20px rgba(123, 92, 255, 0.3);
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(123, 92, 255, 0.45);
        filter: brightness(1.05);
      }

      .footer-text {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: var(--text-dim);
      }

      .footer-text a {
        color: var(--accent-cyan);
        text-decoration: none;
        font-weight: 500;
      }

      .footer-text a:hover { text-decoration: underline; }

      @media (max-width: 480px) {
        .card { padding: 36px 24px 32px; }
        .form-row { grid-template-columns: 1fr; }
      }
    </style>
</head>
<body>
    <video class="video-background" autoplay loop muted playsinline>
      <source src="{{ url_for('static', filename='img/stars.mp4') }}" type="video/mp4">
    </video>

    <div class="card">
      <div class="brand">
        <div class="brand-name">Create Account</div>
        <div class="brand-sub">Join the Truble NLP Platform</div>
      </div>

      <form action="/signup1" method="post">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="@handle" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label for="post">Role / Post</label>
          <input type="text" id="post" name="post" placeholder="e.g. Translator, Developer" required>
        </div>

        <button type="submit">Create Account</button>
      </form>

      <p class="footer-text">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="{{ url_for('static', filename='2.css') }}" />
<link rel="stylesheet" href="{{ url_for('static', filename='styleguide.css') }}" />

<title>Speech Mode</title>
</head>

<body>

<!-- 🌌 Background -->
<video class="video-background" autoplay loop muted playsinline>
  <source src="{{ url_for('static', filename='img/stars.mp4') }}" type="video/mp4">
</video>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    <div class="content">

        <div class="LOGO">
            <div class="div">
                <div class="logo">
                    <div class="all-in-one-social">Truble</div>
                </div>
                <img class="network" src="{{ url_for('static', filename='img/logo.png') }}" />
            </div>
        </div>
<a href="{{ url_for('Japanese', name=name, post=post, unique_id=unique_id) }}">
    <button>
        <img src="{{ url_for('static', filename='img/usg.png') }}" />
        Text (Japanese)
    </button>
</a>
              <button><img src="static/img/usg.png" />Image</button>


<a href="{{ url_for('recordjp', name=name, post=post) }}">
  <button>
    <img src="{{ url_for('static', filename='img/dash.png') }}" />
    Speech
  </button>
</a>
<a href="{{ url_for('landing', name=name, post=post, unique_id=unique_id) }}">
  <button>
    <img src="{{ url_for('static', filename='img/dash.png') }}" />
        Language Select
  </button>
</a>
    </div>
</div>

<!-- Main Content -->
<div class="main-content" id="main-content">

    <!-- NLP Status -->
    <div class="nlp-widget">
        <h3>Live NLP Status</h3>

        <div class="nlp-item">
            <span class="label">🌐 Translation</span>
            <span class="value">JA → EN</span>
        </div>

        <div class="nlp-item">
            <span class="label">🎤 Speech Input</span>
            <span class="value" id="mode-speech">OFF</span>
        </div>

        <div class="nlp-item">
            <span class="label">Image Input</span>
            <span class="value" id="mode-image">ON</span>
        </div>

        <div class="nlp-item">
            <span class="label">📦 Pipeline</span>
            <span class="value active" id="mode-pipeline">Idle</span>
        </div>
    </div>

    <!-- Profile -->
    <div class="profile">
        <div class="overlap-group-2">
            <div class="text-wrapper-2">{{ name }}</div>
            <div class="text-wrapper-3">{{ post }}</div>
        </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-area">
        <div class="msg assistant">Tap the camera icon to capture or upload image.</div>
    </div>
    
<!-- 📷 Floating Image Button -->
<div class="image-btn-wrapper">

    <button id="imageMainBtn" class="image-btn" onclick="toggleImageOptions()">
        📷
    </button>

    <div id="imageOptions" class="image-options">
        <button onclick="openCamera()">📷 Camera</button>
        <button onclick="openUpload()">📁 Upload</button>
    </div>

</div>

<!-- Hidden Inputs -->
<input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="handleImage(event)">
<input type="file" id="cameraCapture" accept="image/*" capture="environment" style="display:none" onchange="handleImage(event)">


</div>



<script>
    function showCameraModal(stream) {
    const modal = document.getElementById("cameraModal");
    const video = document.getElementById("cameraVideo");

    modal.style.display = "flex";
    video.srcObject = stream;
}

function closeCamera() {
    const modal = document.getElementById("cameraModal");
    modal.style.display = "none";

    if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
    }
}

function capturePhoto() {
    const video = document.getElementById("cameraVideo");

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const imageData = canvas.toDataURL("image/png");

    addImageMessage("user", imageData);

    closeCamera();
}

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main-content").classList.toggle("collapsed");
}


function toggleImageOptions() {
    const options = document.getElementById("imageOptions");
    const mainBtn = document.getElementById("imageMainBtn");

    options.classList.toggle("active");
    mainBtn.classList.toggle("active");
}

// Close menu if clicked outside
document.addEventListener("click", function(event) {
    const wrapper = document.querySelector(".image-btn-wrapper");
    const options = document.getElementById("imageOptions");
    const mainBtn = document.getElementById("imageMainBtn");

    if (!wrapper.contains(event.target)) {
        options.classList.remove("active");
        mainBtn.classList.remove("active");
    }
});
function openUpload() {
    document.getElementById("imageUpload").click();
}

let videoStream = null;

async function openCamera() {
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        showCameraModal(videoStream);

    } catch (err) {
        alert("Camera access denied or not available.");
    }
}

function handleImage(event) {

    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        addImageMessage("user", e.target.result);
        document.getElementById("mode-pipeline").innerText = "Image Loaded";
    };

    reader.readAsDataURL(file);
}

async function addImageMessage(role, imageSrc) {

    const chat = document.getElementById("chat-area");

    const div = document.createElement("div");
    div.className = "msg " + role;

    const img = document.createElement("img");
    img.src = imageSrc;
    img.style.maxWidth = "250px";
    img.style.borderRadius = "10px";
    img.style.marginTop = "5px";
    img.style.cursor = "pointer";

    img.onclick = function() {
        document.getElementById("previewImage").src = imageSrc;
        document.getElementById("imagePreviewModal").style.display = "flex";
    };

    const ocrText = document.createElement("div");
    ocrText.style.marginTop = "8px";
    ocrText.style.fontSize = "14px";
    ocrText.style.color = "#ccc";
    ocrText.innerText = "🔎 OCR Text: Processing...";

    div.appendChild(img);
    div.appendChild(ocrText);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    // Update pipeline status
    document.getElementById("mode-pipeline").innerText = "Running OCR";

    // Convert base64 to blob
    const blob = await fetch(imageSrc).then(r => r.blob());

    const formData = new FormData();
    formData.append("image", blob, "image.png");

    const response = await fetch("/upload_image_jp", {
        method: "POST",
        body: formData
    });

    const result = await response.json();

    // Update OCR text
// Show OCR text
ocrText.innerText = "🔎 OCR Text: " + result.ocr_text;

document.getElementById("mode-pipeline").innerText = "Translating";

// 🔥 Call JA → EN route
const translateResponse = await fetch("/translate_ja_en", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
        text: result.ocr_text
    })
});

const translated = await translateResponse.json();

// Create translation element
const translationDiv = document.createElement("div");
translationDiv.style.marginTop = "6px";
translationDiv.style.fontSize = "14px";
translationDiv.style.color = "#00ffcc";
translationDiv.innerText = "🌐 English: " + translated.translated_text;

div.appendChild(translationDiv);

// Update translation label
document.querySelector(".nlp-item .value").innerText = "JA → EN";

document.getElementById("mode-pipeline").innerText = "Complete";
}

</script>
<!-- 📷 Camera Modal -->
<div id="cameraModal" class="camera-modal">
    <div class="camera-content">
        <video id="cameraVideo" autoplay playsinline></video>
        <div class="camera-controls">
            <button onclick="capturePhoto()">📸 Capture</button>
            <button onclick="closeCamera()">❌ Close</button>
        </div>
    </div>
</div>

<!-- 🖼 Image Preview Modal -->
<div id="imagePreviewModal" class="image-preview-modal" onclick="closePreview()">
    <img id="previewImage">
</div>

</body>
</html>
